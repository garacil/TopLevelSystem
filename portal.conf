# Portal v0.4.0 Configuration

[core]
modules_dir = ./modules
socket_path = /var/run/portal.sock
pid_file = /var/run/portal.pid
data_dir = /etc/portal
users_file = ./users.conf
log_level = info

[modules]
load = cli
load = node

[mod_node]
node_name = local
listen_port = 9700
threads_per_peer = 4
