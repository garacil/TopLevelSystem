# Portal devtest instance configuration

[core]
modules_dir = /usr/lib/portal/modules
socket_path = /var/run/portal-devtest.sock
pid_file = /var/run/portal-devtest.pid
data_dir = /etc/portal/devtest
tcp_port = 9800
udp_port = 9800
log_level = debug

[modules]
load = cli
load = node
load = web
load = config_sqlite
load = config_psql

[mod_node]
node_name = devtest
listen_port = 9701
threads_per_peer = 2

[mod_web]
bind = 192.168.1.198
port = 8080
tls_port = 8443
api_prefix = /api
cert_file = /etc/portal/devtest/certs/server.crt
key_file = /etc/portal/devtest/certs/server.key

[mod_config_sqlite]
database = /etc/portal/devtest/portal.db

[mod_config_psql]
host = 192.168.1.87
port = 5433
user = ivoip
password =
database = devportal_conf
