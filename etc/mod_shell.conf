# mod_shell — Remote interactive shell via federation
#
# WARNING: This module gives system-level command access to admin users.
# Disable in production if not needed.
#
# timeout      : Maximum command execution time in seconds (1-300)
# shell        : Shell binary used for execution
# allow_exec   : Safety switch (0 = disabled, 1 = enabled)
# max_output   : Maximum bytes of output captured per command
enabled = true

[mod_shell]
timeout = 10
shell = /bin/sh
allow_exec = true
max_output = 65536
