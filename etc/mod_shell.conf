# mod_shell — Remote interactive shell
#
# WARNING: This module gives system-level command access.
# Only users in the access_label group can use shell functions.
# Default: root (only root user). Set to "admin" for admin group access.
#
# Two independent shell subsystems:
#
#  1. Legacy message-based PTY (exec / open / read / write / close)
#     Used for single-command execution and HTTP-API driven PTY sessions.
#
#  2. Dial-back shell channel (shell_port / open_remote / dialback_request)
#     Used by the CLI "shell <peer>" command. The initiator sends a signal
#     through federation asking the target device to dial back on a
#     dedicated TLS port. The data channel is a fresh independent TCP/TLS
#     connection — federation is NOT used for shell data, only for the
#     one-shot "please dial back" signal. On the target side the PTY runs
#     /bin/login so every shell session is authenticated by PAM, drops to
#     the real user's UID, and appears in wtmp/last.
#
# ── Legacy PTY settings ──
# timeout       : Maximum command execution time in seconds (1-300)
# shell         : Shell binary used for execution
# allow_exec    : Safety switch (0 = disabled, 1 = enabled)
# max_output    : Maximum bytes of output captured per command
# session_ttl   : Auto-close inactive PTY sessions after N seconds
# access_label  : Group/label required to use shell functions (default: root)
#
# ── Dial-back shell channel settings ──
# shell_port             : TCP port for dial-back listener (0 = disabled,
#                          default 2223 — 2222 is taken by mod_ssh on most
#                          instances). When enabled, Portal listens for
#                          incoming TLS connections from peers requesting
#                          to establish an authenticated shell session.
# shell_bind             : Bind address for the listener ("0.0.0.0" = all,
#                          or restrict to a specific interface IP such as
#                          the WireGuard overlay address, default 0.0.0.0)
# shell_tls_cert         : X.509 certificate path for the listener (and the
#                          dial-back client). Defaults to the instance's
#                          shared cert: /etc/portal/<instance>/certs/server.crt
# shell_tls_key          : Private key for the TLS cert (defaults to the
#                          instance's server.key)
# shell_advertise_host   : Hostname or IP the target device should dial back
#                          to. If empty, the module uses its own first
#                          non-loopback IPv4 address. Set this explicitly
#                          when Portal runs behind NAT or on a multi-homed
#                          host and you need devices to reach a specific
#                          overlay IP (e.g., the WireGuard address).
# shell_login_binary     : Path to the program executed in the PTY on the
#                          target side after the user types a login name
#                          at our prompt. Default /bin/su — invoked as
#                          "su -l <user>", PAM prompts for password,
#                          drops to the user's UID, runs their login
#                          shell, writes utmp/wtmp.
#                          We do NOT use /bin/login because modern
#                          util-linux 2.40+ rejects forkpty'd PTYs with
#                          "FATAL: bad tty" (its check_tty() requires
#                          setup only getty provides). /bin/su works on
#                          any PTY and uses the same PAM stack.
# shell_dial_timeout     : Seconds the initiator waits for the device to
#                          dial back before returning "unavailable"
#                          (default 10, range 1-60).
enabled = true

[mod_shell]
timeout = 10
shell = /bin/sh
allow_exec = true
max_output = 65536
session_ttl = 3600
access_label = root

shell_port = 2223
shell_bind = 0.0.0.0
shell_tls_cert =
shell_tls_key =
shell_advertise_host =
shell_login_binary = /bin/su
shell_dial_timeout = 10
