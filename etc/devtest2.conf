# Portal devtest2 instance — second node for testing federation

[core]
modules_dir = /usr/lib/portal/modules
socket_path = /var/run/portal-devtest2.sock
pid_file = /var/run/portal-devtest2.pid
data_dir = /etc/portal/devtest2
tcp_port = 9801
udp_port = 9801
log_level = debug

[modules]
load = cli
load = node
load = config_sqlite

[mod_node]
node_name = devtest2
listen_port = 9702
threads_per_peer = 2

[mod_config_sqlite]
database = /etc/portal/devtest2/portal.db

# Connect to devtest node
[nodes]
peer0 = devtest=127.0.0.1:9701
