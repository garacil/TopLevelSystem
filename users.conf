# Portal users configuration
# Format: username:password:label1,label2:api_key
#   api_key: "auto" = generate on startup, empty = generate on first use
#
# The 'root' user always exists.

root:portal::auto
admin:admin:admin,dev:auto
user:user:viewer:
dev:dev:dev,api:auto
